<!DOCTYPE html>
<html>
<head>
    <title>SmartChat AI</title>
</head>

<body style="margin:0; font-family:Arial; background:#0f0f0f; color:white;">

<div style="display:flex; height:100vh;">

    <!-- SIDEBAR -->
    <div style="width:250px; background:#1a1a1a; padding:20px;">
        <h2>SmartChat AI</h2>

        <p style="color:gray;">
            Welcome, {{ request.user.username }}
        </p>

        <a href="/logout/" style="color:#10a37f;">Logout</a>
    </div>

    <!-- CHAT AREA -->
    <div style="flex:1; display:flex; flex-direction:column;">

        <!-- messages box -->
        <div id="box" style="flex:1; padding:20px; overflow-y:auto;">

            <div style="background:#2a2a2a;padding:10px;margin:10px;border-radius:10px;">
                👋 Hello! Ask me anything
            </div>

        </div>

        <!-- input area -->
        <div style="display:flex; padding:10px; background:#1a1a1a;">

            <input id="msg" placeholder="Type message..."
                   style="flex:1;padding:10px;border:none;border-radius:5px;">

            <button onclick="send()"
                    style="margin-left:10px;background:#10a37f;color:white;padding:10px;border:none;border-radius:5px;">
                Send
            </button>

        </div>

    </div>

</div>

<script>
async function send() {
    let msg = document.getElementById("msg").value;
    let box = document.getElementById("box");

    if (!msg) return;

    // show user message
    box.innerHTML += `
        <div style="background:#10a37f;padding:10px;margin:10px;border-radius:10px;text-align:right;">
            ${msg}
        </div>
    `;

    document.getElementById("msg").value = "";

    // API call
    let res = await fetch("/chat-api/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: msg})
    });

    let data = await res.json();

    // show bot response
    box.innerHTML += `
        <div style="background:#2a2a2a;padding:10px;margin:10px;border-radius:10px;">
            ${data.reply}
        </div>
    `;

    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
